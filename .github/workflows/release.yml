name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -e
          NAME="faith-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$NAME"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/faith.exe" "$NAME/"
          else
            cp "target/${{ matrix.target }}/release/faith" "$NAME/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md "$NAME/"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "$NAME.zip" "$NAME"
          else
            tar czf "$NAME.tar.gz" "$NAME"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            faith-*.tar.gz
            faith-*.zip

  publish-crate:
    name: cargo publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
