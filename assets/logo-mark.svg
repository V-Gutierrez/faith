<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="faith mark">
  <title>faith mark</title>
  <rect width="64" height="64" rx="10" ry="10" fill="#0a0a0a"/>

  <!-- Book, scaled into 64x64 viewbox, centered around (32, 28) -->
  <g transform="translate(12 12)">
    <path d="M0 4 L20 0 L20 30 L0 34 Z"
          fill="#0f1410" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
    <path d="M40 4 L20 0 L20 30 L40 34 Z"
          fill="#0f1410" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
    <line x1="20" y1="0" x2="20" y2="30" stroke="#10b981" stroke-width="1.5"/>
  </g>

  <!-- Cursor block under spine -->
  <g transform="translate(28 48)">
    <rect width="8" height="9" fill="#10b981">
      <animate attributeName="opacity"
               values="1;1;0.15;1"
               keyTimes="0;0.5;0.75;1"
               dur="1.6s"
               repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
