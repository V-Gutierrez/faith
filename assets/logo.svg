<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="faith logo">
  <title>faith — agent-first Bible CLI</title>
  <!-- Void black background, rounded square -->
  <rect width="256" height="256" rx="40" ry="40" fill="#0a0a0a"/>

  <!-- Subtle inner glow ring -->
  <rect x="6" y="6" width="244" height="244" rx="36" ry="36"
        fill="none" stroke="#10b981" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Stylised book: two pages, a spine, gilded edge.
       Centered around (128, 110), 120 wide x 84 tall. -->
  <g transform="translate(68 68)">
    <!-- left page -->
    <path d="M0 8 L60 0 L60 76 L0 84 Z"
          fill="#0f1410" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M120 8 L60 0 L60 76 L120 84 Z"
          fill="#0f1410" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>
    <!-- spine highlight -->
    <line x1="60" y1="0" x2="60" y2="76" stroke="#10b981" stroke-width="2.5"/>
    <!-- text lines on left page (Scripture suggestion) -->
    <line x1="10" y1="26" x2="48" y2="22" stroke="#10b981" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="40" x2="48" y2="36" stroke="#10b981" stroke-opacity="0.40" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="54" x2="40" y2="50" stroke="#10b981" stroke-opacity="0.30" stroke-width="2" stroke-linecap="round"/>
    <!-- text lines on right page -->
    <line x1="72" y1="22" x2="110" y2="26" stroke="#10b981" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="36" x2="110" y2="40" stroke="#10b981" stroke-opacity="0.40" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="50" x2="102" y2="54" stroke="#10b981" stroke-opacity="0.30" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Terminal cursor block: agent / CLI symbol, sitting just below the spine -->
  <g transform="translate(116 162)">
    <rect width="24" height="28" fill="#10b981">
      <animate attributeName="opacity"
               values="1;1;0.15;1"
               keyTimes="0;0.5;0.75;1"
               dur="1.6s"
               repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Wordmark -->
  <text x="128" y="222" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="28" font-weight="700" fill="#10b981" letter-spacing="2">faith</text>
</svg>
